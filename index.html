<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CP Database Summary Dashboard</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #1a1f2e; min-height: 100vh; padding: 2.5rem 2rem 4rem; }
  .wrap { max-width: 960px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 1.75rem; flex-wrap: wrap; gap: 1rem;
    padding-bottom: 1.5rem; border-bottom: 2px solid #dde2ed;
  }
  .title-block h1 { font-size: 1.5rem; font-weight: 700; color: #1a1f2e; letter-spacing: -0.01em; }
  .title-block .subtitle { font-size: 0.78rem; color: #6b7591; margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .status-pill {
    display: flex; align-items: center; gap: 0.45rem;
    background: #fff; border: 1px solid #dde2ed; border-radius: 6px;
    padding: 0.35rem 0.9rem; font-size: 0.78rem; color: #6b7591; height: fit-content; margin-top: 0.25rem;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.error { background: #ef4444; }
  .dot.loading { background: #f59e0b; }

  /* MONTH TABS */
  .month-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.75rem; }
  .month-btn {
    padding: 0.45rem 1rem; border-radius: 6px; border: 1px solid #dde2ed;
    background: #fff; font-family: 'Inter', sans-serif; font-size: 0.8rem;
    font-weight: 500; color: #6b7591; cursor: pointer; transition: all 0.15s;
  }
  .month-btn:hover { background: #eef2ff; border-color: #c5cff5; color: #3b5bdb; }
  .month-btn.active { background: #3b5bdb; border-color: #3b5bdb; color: #fff; font-weight: 600; }

  /* STAT CARDS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
  .stat-card { background: #fff; border: 1px solid #dde2ed; border-radius: 10px; padding: 1.25rem 1.5rem; border-top: 3px solid #dde2ed; }
  .stat-card.c1 { border-top-color: #3b5bdb; }
  .stat-card.c2 { border-top-color: #0ea5e9; }
  .stat-card.c3 { border-top-color: #f59e0b; }
  .stat-card.c4 { border-top-color: #10b981; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7591; font-weight: 600; margin-bottom: 0.6rem; }
  .stat-value { font-size: 2.2rem; font-weight: 700; color: #1a1f2e; line-height: 1; }
  .stat-card.c1 .stat-value { color: #3b5bdb; }
  .stat-card.c2 .stat-value { color: #0ea5e9; }
  .stat-card.c3 .stat-value { color: #d97706; }
  .stat-card.c4 .stat-value { color: #10b981; }

  /* TABLE */
  .table-section { background: #fff; border: 1px solid #dde2ed; border-radius: 10px; overflow: hidden; margin-bottom: 1rem; }
  .table-header {
    padding: 1rem 1.5rem; border-bottom: 1px solid #dde2ed;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-header h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #1a1f2e; }
  .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 4px; background: #eef2ff; color: #3b5bdb; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f8f9fc; }
  th { text-align: left; padding: 0.9rem 1.5rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7591; font-weight: 600; border-bottom: 1px solid #dde2ed; }
  th:not(:first-child) { text-align: center; }
  tbody tr { border-bottom: 1px solid #f0f2f7; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f4ff; }
  td { padding: 1rem 1.5rem; vertical-align: middle; }
  td:not(:first-child) { text-align: center; }

  .officer-name {
    font-size: 1rem; font-weight: 600; color: #3b5bdb;
    cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
    transition: color 0.15s;
  }
  .officer-name:hover { color: #2244c4; }

  .num { font-size: 1rem; font-weight: 600; display: inline-block; min-width: 2.5rem; text-align: center; }
  .num-pending  { color: #d97706; }
  .num-finished { color: #10b981; }
  .num-total    { color: #3b5bdb; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .progress-bar { width: 80px; height: 6px; background: #e8ecf4; border-radius: 99px; overflow: hidden; flex-shrink: 0; }
  .progress-fill { height: 100%; border-radius: 99px; background: #10b981; transition: width 0.7s ease; }

  .no-data-msg { padding: 3rem 2rem; text-align: center; color: #9ba3be; font-size: 0.9rem; }
  .state-msg { padding: 3rem 2rem; text-align: center; color: #6b7591; font-size: 0.9rem; }
  .spinner { width: 28px; height: 28px; margin: 0 auto 1rem; border: 2px solid #dde2ed; border-top-color: #3b5bdb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,20,40,0.45); z-index: 100;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; width: 100%; max-width: 680px;
    max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .modal-header {
    padding: 1.25rem 1.5rem; border-bottom: 1px solid #dde2ed;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .modal-header h3 { font-size: 1.1rem; font-weight: 700; color: #1a1f2e; }
  .modal-header .month-tag { font-size: 0.75rem; color: #6b7591; margin-top: 2px; }
  .modal-close {
    background: #f4f6f9; border: none; border-radius: 6px;
    width: 32px; height: 32px; font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #6b7591; transition: background 0.15s;
  }
  .modal-close:hover { background: #e8ecf4; color: #1a1f2e; }

  .modal-tabs { display: flex; border-bottom: 1px solid #dde2ed; flex-shrink: 0; }
  .modal-tab {
    flex: 1; padding: 0.75rem 1rem; text-align: center;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    border: none; background: none; font-family: 'Inter', sans-serif;
    color: #6b7591; border-bottom: 2px solid transparent;
    transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .modal-tab.active { color: #3b5bdb; border-bottom-color: #3b5bdb; }
  .modal-tab.tab-pending.active { color: #d97706; border-bottom-color: #d97706; }
  .modal-tab.tab-done.active { color: #10b981; border-bottom-color: #10b981; }

  .modal-body { overflow-y: auto; flex: 1; padding: 0; }
  .modal-list { list-style: none; }
  .modal-list li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.5rem; border-bottom: 1px solid #f0f2f7;
    font-size: 0.88rem;
  }
  .modal-list li:last-child { border-bottom: none; }
  .modal-list .case-no { font-weight: 400; color: #6b7591; font-size: 0.78rem; margin-right: 1rem; min-width: 2rem; }
  .modal-list .case-id { font-weight: 600; color: #1a1f2e; flex: 1; }
  .status-badge {
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-distributed { background: #fff3cd; color: #b45309; }
  .badge-submitted   { background: #d1fae5; color: #065f46; }
  .badge-signed      { background: #dbeafe; color: #1e40af; }
  .badge-other       { background: #f3f4f6; color: #6b7280; }

  .empty-tab { padding: 2.5rem; text-align: center; color: #9ba3be; font-size: 0.88rem; }

  .modal-summary {
    display: flex; gap: 1rem; padding: 1rem 1.5rem;
    background: #f8f9fc; border-bottom: 1px solid #dde2ed; flex-shrink: 0;
  }
  .modal-stat { font-size: 0.78rem; color: #6b7591; }
  .modal-stat strong { font-size: 1rem; font-weight: 700; display: block; }
  .modal-stat.s-pending strong { color: #d97706; }
  .modal-stat.s-done strong { color: #10b981; }
  .modal-stat.s-total strong { color: #3b5bdb; }

  .last-updated { font-size: 0.75rem; color: #6b7591; text-align: right; margin-bottom: 1.5rem; }
  footer { text-align: center; padding-top: 1.25rem; font-size: 0.75rem; color: #9ba3be; border-top: 1px solid #dde2ed; }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    th, td { padding: 0.75rem 1rem; }
    .progress-bar { display: none; }
    .stat-value { font-size: 1.6rem; }
    .modal { max-height: 90vh; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block">
      <h1>CP Database Summary</h1>
      <div class="subtitle" id="dashSubtitle">Select a month below</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <div class="month-nav" id="monthNav"></div>

  <div class="stats-row">
    <div class="stat-card c1"><div class="stat-label">Total Cases</div><div class="stat-value" id="totalCases">—</div></div>
    <div class="stat-card c2"><div class="stat-label">Distributed</div><div class="stat-value" id="distributed">—</div></div>
    <div class="stat-card c3"><div class="stat-label">Submitted</div><div class="stat-value" id="submitted">—</div></div>
    <div class="stat-card c4"><div class="stat-label">Signed</div><div class="stat-value" id="signed">—</div></div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <h2>Action Officers</h2>
      <span class="tag" id="officerCount">—</span>
    </div>
    <div id="tableWrap">
      <div class="state-msg">Select a month above to view data.</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
  <footer>Auto-refreshes every 60 seconds &nbsp;·&nbsp; Click an officer's name to see their case details</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="modalOfficerName">Officer</h3>
        <div class="month-tag" id="modalMonthTag"></div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-summary">
      <div class="modal-stat s-pending"><strong id="mPending">0</strong>Pending</div>
      <div class="modal-stat s-done"><strong id="mDone">0</strong>Submitted / Signed</div>
      <div class="modal-stat s-total"><strong id="mTotal">0</strong>Total</div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab tab-pending active" id="tabPending">⏳ Pending</button>
      <button class="modal-tab tab-done" id="tabDone">✅ Submitted / Signed</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const MONTHS = [
  { label: "April 2026",     summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=585589558&single=true&output=csv",   detailUrl: null },
  { label: "May 2026",       summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1916268155&single=true&output=csv",  detailUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=0&single=true&output=csv" },
  { label: "June 2026",      summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1718435140&single=true&output=csv", detailUrl: null },
  { label: "July 2026",      summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=2134664893&single=true&output=csv", detailUrl: null },
  { label: "August 2026",    summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=314960525&single=true&output=csv",  detailUrl: null },
  { label: "September 2026", summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=254654728&single=true&output=csv",  detailUrl: null },
  { label: "October 2026",   summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=695696972&single=true&output=csv",  detailUrl: null },
  { label: "November 2026",  summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1510080080&single=true&output=csv", detailUrl: null },
  { label: "December 2026",  summaryUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=840071884&single=true&output=csv",  detailUrl: null },
];

let activeIndex = 1;
let refreshTimer = null;
let detailCache = {}; // cache detail data per month
let currentOfficer = null;
let currentTab = "pending";

// ── Build month buttons
const nav = document.getElementById("monthNav");
MONTHS.forEach((m, i) => {
  const btn = document.createElement("button");
  btn.className = "month-btn" + (i === activeIndex ? " active" : "");
  btn.textContent = m.label;
  btn.id = "btn-" + i;
  btn.addEventListener("click", () => selectMonth(i));
  nav.appendChild(btn);
});

function selectMonth(i) {
  activeIndex = i;
  detailCache = {};
  document.querySelectorAll(".month-btn").forEach((b, idx) => b.classList.toggle("active", idx === i));
  clearInterval(refreshTimer);
  fetchSummary();
  if (MONTHS[i].detailUrl) fetchDetail();
  refreshTimer = setInterval(() => {
    fetchSummary();
    if (MONTHS[activeIndex].detailUrl) fetchDetail();
  }, 60000);
}

function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function num(v) {
  if (!v || v === "") return 0;
  const n = Number(String(v).replace(/,/g, "").trim());
  return isNaN(n) ? 0 : n;
}

function setStatus(state, msg) {
  document.getElementById("statusText").textContent = msg;
  document.getElementById("statusDot").className = "dot" + (state === "live" ? "" : state === "loading" ? " loading" : " error");
}

function isEmptySheet(rows) {
  if (rows.length < 2) return true;
  return (rows[1] || []).every(v => !v || v.trim() === "" || v.trim() === "0");
}

// ── SUMMARY
async function fetchSummary() {
  const month = MONTHS[activeIndex];
  setStatus("loading", "Loading...");
  document.getElementById("tableWrap").innerHTML = `<div class="state-msg"><div class="spinner"></div>Fetching ${month.label} data…</div>`;
  try {
    const res = await fetch(month.summaryUrl + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text());
    renderSummary(rows, month.label, !!month.detailUrl);
    setStatus("live", "Live");
    document.getElementById("lastUpdated").textContent = "Last updated: " + new Date().toLocaleTimeString();
  } catch (e) {
    setStatus("error", "Error");
    document.getElementById("tableWrap").innerHTML = `<div class="state-msg">⚠️ Could not load data: ${e.message}</div>`;
  }
}

function renderSummary(rows, monthLabel, hasDetail) {
  document.getElementById("dashSubtitle").textContent = monthLabel + " — CP Summary";
  if (isEmptySheet(rows)) {
    ["totalCases","distributed","submitted","signed"].forEach(id => document.getElementById(id).textContent = "—");
    document.getElementById("officerCount").textContent = "—";
    document.getElementById("tableWrap").innerHTML = `<div class="no-data-msg">📋 No data yet for ${monthLabel}.<br><span style="font-size:0.8rem;color:#b0b8d0">Data will appear here once the sheet is filled in.</span></div>`;
    return;
  }
  const s = rows[1] || [];
  document.getElementById("totalCases").textContent  = num(s[0]) || "0";
  document.getElementById("distributed").textContent = num(s[1]) || "0";
  document.getElementById("submitted").textContent   = num(s[2]) || "0";
  document.getElementById("signed").textContent      = num(s[3]) || "0";

  const officerRows = rows.slice(3).filter(r => r[0] && r[0].trim());
  document.getElementById("officerCount").textContent = officerRows.length + " officer" + (officerRows.length !== 1 ? "s" : "");

  let tbody = "";
  officerRows.forEach(r => {
    const name     = r[0] || "—";
    const pending  = num(r[1]);
    const finished = num(r[2]);
    const total    = num(r[3]);
    const pct      = total > 0 ? Math.round((finished / total) * 100) : 0;
    const clickable = hasDetail
      ? `<span class="officer-name" onclick="openModal('${name}')">${name}</span>`
      : `<span style="font-size:1rem;font-weight:600;color:#1a1f2e">${name}</span>`;
    tbody += `
      <tr>
        <td>${clickable}</td>
        <td><span class="num num-pending">${pending}</span></td>
        <td>
          <div class="progress-wrap">
            <span class="num num-finished">${finished}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </td>
        <td><span class="num num-total">${total}</span></td>
      </tr>`;
  });

  const hint = hasDetail ? `<tr><td colspan="4" style="padding:0.5rem 1.5rem;font-size:0.72rem;color:#9ba3be;border-top:1px solid #f0f2f7;">💡 Click an officer's name to view their case details</td></tr>` : "";
  document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead><tr><th>Action Officer</th><th>Pending</th><th>Finished</th><th>Total</th></tr></thead>
      <tbody>${tbody}${hint}</tbody>
    </table>`;
}

// ── DETAIL
async function fetchDetail() {
  const month = MONTHS[activeIndex];
  if (!month.detailUrl) return;
  try {
    const res = await fetch(month.detailUrl + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text());
    // Find header row (has "Action Officer" or "Status")
    let dataStart = 0;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      const r = rows[i].map(c => c.toUpperCase());
      if (r.some(c => c.includes("STATUS") || c.includes("ACTION"))) { dataStart = i + 1; break; }
    }
    const cases = [];
    for (let i = dataStart; i < rows.length; i++) {
      const r = rows[i];
      // B=col1(idx0 in CSV but sheet col B = CSV col 1), C=idx2, D=idx3, E=idx4
      // CSV: col0=empty/A, col1=B(No), col2=C(CPCN), col3=D(Officer), col4=E(Status)
      const no      = r[1] || "";
      const cpcn    = r[2] || "";
      const officer = (r[3] || "").trim().toUpperCase();
      const status  = (r[4] || "").trim().toUpperCase();
      if (cpcn && officer) cases.push({ no, cpcn, officer, status });
    }
    detailCache[activeIndex] = cases;
  } catch (e) {
    console.warn("Detail fetch failed:", e.message);
  }
}

// ── MODAL
function statusBadge(status) {
  if (status === "SUBMITTED") return `<span class="status-badge badge-submitted">Submitted</span>`;
  if (status === "SIGNED")    return `<span class="status-badge badge-signed">Signed</span>`;
  if (status === "DISTRIBUTED") return `<span class="status-badge badge-distributed">Distributed</span>`;
  return `<span class="status-badge badge-other">${status || "—"}</span>`;
}

function openModal(officerName) {
  currentOfficer = officerName.toUpperCase();
  currentTab = "pending";
  document.getElementById("modalOfficerName").textContent = officerName;
  document.getElementById("modalMonthTag").textContent = MONTHS[activeIndex].label + " CP Database";
  document.getElementById("tabPending").classList.add("active");
  document.getElementById("tabDone").classList.remove("active");
  renderModalTab();
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderModalTab() {
  const cases = detailCache[activeIndex] || [];
  const mine = cases.filter(c => c.officer === currentOfficer);

  // Pending = DISTRIBUTED (not yet submitted/signed)
  const pending  = mine.filter(c => c.status === "DISTRIBUTED");
  // Done = SUBMITTED or SIGNED
  const done     = mine.filter(c => c.status === "SUBMITTED" || c.status === "SIGNED");

  document.getElementById("mPending").textContent = pending.length;
  document.getElementById("mDone").textContent    = done.length;
  document.getElementById("mTotal").textContent   = mine.length;

  const list = currentTab === "pending" ? pending : done;
  if (list.length === 0) {
    document.getElementById("modalBody").innerHTML =
      `<div class="empty-tab">${currentTab === "pending" ? "🎉 No pending cases!" : "No submitted/signed cases yet."}</div>`;
    return;
  }
  const items = list.map((c, i) =>
    `<li>
      <span class="case-no">${c.no || i+1}</span>
      <span class="case-id">${c.cpcn}</span>
      ${statusBadge(c.status)}
    </li>`
  ).join("");
  document.getElementById("modalBody").innerHTML = `<ul class="modal-list">${items}</ul>`;
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => { if (e.target === document.getElementById("modalOverlay")) closeModal(); });

document.getElementById("tabPending").addEventListener("click", () => {
  currentTab = "pending";
  document.getElementById("tabPending").classList.add("active");
  document.getElementById("tabDone").classList.remove("active");
  renderModalTab();
});
document.getElementById("tabDone").addEventListener("click", () => {
  currentTab = "done";
  document.getElementById("tabDone").classList.add("active");
  document.getElementById("tabPending").classList.remove("active");
  renderModalTab();
});

// ── INIT
selectMonth(activeIndex);
</script>
</body>
</html>
