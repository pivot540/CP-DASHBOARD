<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CP Database Summary Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
    color: #1a1f2e;
    min-height: 100vh;
    padding: 2.5rem 2rem 4rem;
  }
  .wrap { max-width: 960px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 1.75rem; flex-wrap: wrap; gap: 1rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid #dde2ed;
  }
  .title-block h1 { font-size: 1.5rem; font-weight: 700; color: #1a1f2e; letter-spacing: -0.01em; }
  .title-block .subtitle { font-size: 0.78rem; color: #6b7591; margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .status-pill {
    display: flex; align-items: center; gap: 0.45rem;
    background: #fff; border: 1px solid #dde2ed;
    border-radius: 6px; padding: 0.35rem 0.9rem;
    font-size: 0.78rem; color: #6b7591; height: fit-content; margin-top: 0.25rem;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.error { background: #ef4444; }
  .dot.loading { background: #f59e0b; }

  /* MONTH TABS */
  .month-nav {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-bottom: 1.75rem;
  }
  .month-btn {
    padding: 0.45rem 1rem;
    border-radius: 6px;
    border: 1px solid #dde2ed;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    color: #6b7591; cursor: pointer;
    transition: all 0.15s;
  }
  .month-btn:hover { background: #eef2ff; border-color: #c5cff5; color: #3b5bdb; }
  .month-btn.active {
    background: #3b5bdb; border-color: #3b5bdb;
    color: #fff; font-weight: 600;
  }
  .month-btn.empty { opacity: 0.5; }

  /* STAT CARDS */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1rem; margin-bottom: 1.75rem;
  }
  .stat-card {
    background: #fff; border: 1px solid #dde2ed;
    border-radius: 10px; padding: 1.25rem 1.5rem;
    border-top: 3px solid #dde2ed;
  }
  .stat-card.c1 { border-top-color: #3b5bdb; }
  .stat-card.c2 { border-top-color: #0ea5e9; }
  .stat-card.c3 { border-top-color: #f59e0b; }
  .stat-card.c4 { border-top-color: #10b981; }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7591; font-weight: 600; margin-bottom: 0.6rem; }
  .stat-value { font-size: 2.2rem; font-weight: 700; color: #1a1f2e; line-height: 1; }
  .stat-card.c1 .stat-value { color: #3b5bdb; }
  .stat-card.c2 .stat-value { color: #0ea5e9; }
  .stat-card.c3 .stat-value { color: #d97706; }
  .stat-card.c4 .stat-value { color: #10b981; }

  /* TABLE */
  .table-section {
    background: #fff; border: 1px solid #dde2ed;
    border-radius: 10px; overflow: hidden; margin-bottom: 1rem;
  }
  .table-header {
    padding: 1rem 1.5rem; border-bottom: 1px solid #dde2ed;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-header h2 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #1a1f2e; }
  .tag { font-size: 0.72rem; padding: 3px 10px; border-radius: 4px; background: #eef2ff; color: #3b5bdb; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f8f9fc; }
  th {
    text-align: left; padding: 0.9rem 1.5rem;
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: #6b7591;
    font-weight: 600; border-bottom: 1px solid #dde2ed;
  }
  th:not(:first-child) { text-align: center; }
  tbody tr { border-bottom: 1px solid #f0f2f7; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9fc; }
  td { padding: 1rem 1.5rem; vertical-align: middle; }
  td:not(:first-child) { text-align: center; }
  .officer-name { font-size: 1rem; font-weight: 600; color: #1a1f2e; }
  .num { font-size: 1rem; font-weight: 600; display: inline-block; min-width: 2.5rem; text-align: center; }
  .num-pending  { color: #d97706; }
  .num-finished { color: #10b981; }
  .num-total    { color: #3b5bdb; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .progress-bar { width: 80px; height: 6px; background: #e8ecf4; border-radius: 99px; overflow: hidden; flex-shrink: 0; }
  .progress-fill { height: 100%; border-radius: 99px; background: #10b981; transition: width 0.7s ease; }

  .no-data-msg {
    padding: 3rem 2rem; text-align: center;
    color: #9ba3be; font-size: 0.9rem;
  }
  .no-data-msg .icon { font-size: 2rem; margin-bottom: 0.5rem; }

  footer { text-align: center; padding-top: 1.25rem; font-size: 0.75rem; color: #9ba3be; border-top: 1px solid #dde2ed; }
  .last-updated { font-size: 0.75rem; color: #6b7591; text-align: right; margin-bottom: 1.5rem; }

  .state-msg { padding: 3rem 2rem; text-align: center; color: #6b7591; font-size: 0.9rem; }
  .spinner { width: 28px; height: 28px; margin: 0 auto 1rem; border: 2px solid #dde2ed; border-top-color: #3b5bdb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    th, td { padding: 0.75rem 1rem; }
    .progress-bar { display: none; }
    .stat-value { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>CP Database Summary</h1>
      <div class="subtitle" id="dashSubtitle">Select a month below</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <!-- MONTH TABS -->
  <div class="month-nav" id="monthNav"></div>

  <!-- STAT CARDS -->
  <div class="stats-row">
    <div class="stat-card c1"><div class="stat-label">Total Cases</div><div class="stat-value" id="totalCases">—</div></div>
    <div class="stat-card c2"><div class="stat-label">Distributed</div><div class="stat-value" id="distributed">—</div></div>
    <div class="stat-card c3"><div class="stat-label">Submitted</div><div class="stat-value" id="submitted">—</div></div>
    <div class="stat-card c4"><div class="stat-label">Signed</div><div class="stat-value" id="signed">—</div></div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-header">
      <h2>Action Officers</h2>
      <span class="tag" id="officerCount">—</span>
    </div>
    <div id="tableWrap">
      <div class="state-msg">Select a month above to view data.</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
  <footer>Auto-refreshes every 60 seconds &nbsp;·&nbsp; Data pulled live from Google Sheets</footer>
</div>

<script>
const MONTHS = [
  { label: "April 2026",     url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=585589558&single=true&output=csv" },
  { label: "May 2026",       url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1916268155&single=true&output=csv" },
  { label: "June 2026",      url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1718435140&single=true&output=csv" },
  { label: "July 2026",      url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=2134664893&single=true&output=csv" },
  { label: "August 2026",    url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=314960525&single=true&output=csv" },
  { label: "September 2026", url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=254654728&single=true&output=csv" },
  { label: "October 2026",   url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=695696972&single=true&output=csv" },
  { label: "November 2026",  url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1510080080&single=true&output=csv" },
  { label: "December 2026",  url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=840071884&single=true&output=csv" },
];

let activeIndex = 1; // default to May
let refreshTimer = null;

// Build month buttons
const nav = document.getElementById("monthNav");
MONTHS.forEach((m, i) => {
  const btn = document.createElement("button");
  btn.className = "month-btn" + (i === activeIndex ? " active" : "");
  btn.textContent = m.label;
  btn.addEventListener("click", () => selectMonth(i));
  btn.id = "btn-" + i;
  nav.appendChild(btn);
});

function selectMonth(i) {
  activeIndex = i;
  document.querySelectorAll(".month-btn").forEach((b, idx) => {
    b.classList.toggle("active", idx === i);
  });
  clearInterval(refreshTimer);
  fetchData();
  refreshTimer = setInterval(fetchData, 60000);
}

function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function num(v) {
  if (!v || v === "") return 0;
  const n = Number(String(v).replace(/,/g, "").trim());
  return isNaN(n) ? 0 : n;
}

function setStatus(state, msg) {
  document.getElementById("statusText").textContent = msg;
  const dot = document.getElementById("statusDot");
  dot.className = "dot" + (state === "live" ? "" : state === "loading" ? " loading" : " error");
}

function isEmptySheet(rows) {
  // Check if sheet has no meaningful data beyond headers
  if (rows.length < 2) return true;
  const s = rows[1] || [];
  return s.every(v => !v || v.trim() === "" || v.trim() === "0");
}

function render(rows, monthLabel) {
  document.getElementById("dashSubtitle").textContent = monthLabel + " — CP Summary";

  if (isEmptySheet(rows)) {
    // Month exists but no data yet
    document.getElementById("totalCases").textContent  = "—";
    document.getElementById("distributed").textContent = "—";
    document.getElementById("submitted").textContent   = "—";
    document.getElementById("signed").textContent      = "—";
    document.getElementById("officerCount").textContent = "—";
    document.getElementById("tableWrap").innerHTML = `
      <div class="no-data-msg">
        <div class="icon">📋</div>
        No data yet for ${monthLabel}.<br>
        <span style="font-size:0.8rem;color:#b0b8d0">Data will appear here once the sheet is filled in.</span>
      </div>`;
    return;
  }

  const s = rows[1] || [];
  document.getElementById("totalCases").textContent  = num(s[0]) || "0";
  document.getElementById("distributed").textContent = num(s[1]) || "0";
  document.getElementById("submitted").textContent   = num(s[2]) || "0";
  document.getElementById("signed").textContent      = num(s[3]) || "0";

  const officerRows = rows.slice(3).filter(r => r[0] && r[0].trim() !== "");
  document.getElementById("officerCount").textContent =
    officerRows.length + " officer" + (officerRows.length !== 1 ? "s" : "");

  let tbody = "";
  officerRows.forEach(r => {
    const name     = r[0] || "—";
    const pending  = num(r[1]);
    const finished = num(r[2]);
    const total    = num(r[3]);
    const pct      = total > 0 ? Math.round((finished / total) * 100) : 0;
    tbody += `
      <tr>
        <td><span class="officer-name">${name}</span></td>
        <td><span class="num num-pending">${pending}</span></td>
        <td>
          <div class="progress-wrap">
            <span class="num num-finished">${finished}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </td>
        <td><span class="num num-total">${total}</span></td>
      </tr>`;
  });

  document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead><tr>
        <th>Action Officer</th><th>Pending</th><th>Finished</th><th>Total</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;
}

async function fetchData() {
  const month = MONTHS[activeIndex];
  setStatus("loading", "Loading...");
  document.getElementById("tableWrap").innerHTML =
    `<div class="state-msg"><div class="spinner"></div>Fetching ${month.label} data…</div>`;

  try {
    const res = await fetch(month.url + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    render(parseCSV(text), month.label);
    setStatus("live", "Live");
    document.getElementById("lastUpdated").textContent =
      "Last updated: " + new Date().toLocaleTimeString();
  } catch (e) {
    setStatus("error", "Error");
    document.getElementById("tableWrap").innerHTML =
      `<div class="state-msg">⚠️ Could not load data: ${e.message}</div>`;
  }
}

// Load default month on start
selectMonth(activeIndex);
</script>
</body>
</html>
