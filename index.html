<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CP Database Summary Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f1a;
    --surface: #151826;
    --surface2: #1c2035;
    --border: rgba(255,255,255,0.07);
    --text: #f0f2ff;
    --muted: #8891b0;
    --accent1: #5b6ef5;
    --accent2: #38d9a9;
    --accent3: #f7b731;
    --accent4: #fc5c7d;
    --accent5: #a29bfe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
  }
  .bg-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(91,110,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,110,245,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(91,110,245,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
  }
  .title-block h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .title-block .subtitle {
    font-size: 0.85rem; color: var(--muted);
    margin-top: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .status-pill {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 0.4rem 1rem;
    font-size: 0.78rem; color: var(--muted); white-space: nowrap;
    height: fit-content; margin-top: 0.3rem;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; animation: pulse 2s infinite; }
  .dot.error { background: var(--accent4); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.25rem 1.4rem;
    position: relative; overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .stat-card.c1::before { background: linear-gradient(90deg, var(--accent1), var(--accent5)); }
  .stat-card.c2::before { background: linear-gradient(90deg, var(--accent2), #00b4d8); }
  .stat-card.c3::before { background: linear-gradient(90deg, var(--accent3), #ff9f43); }
  .stat-card.c4::before { background: linear-gradient(90deg, var(--accent4), #ff6b6b); }
  .stat-label {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 0.5rem;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem; font-weight: 800; line-height: 1; color: var(--text);
  }
  .stat-card.c1 .stat-value { color: var(--accent5); }
  .stat-card.c2 .stat-value { color: var(--accent2); }
  .stat-card.c3 .stat-value { color: var(--accent3); }
  .stat-card.c4 .stat-value { color: var(--accent4); }

  .table-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .table-header {
    padding: 1.2rem 1.6rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.75rem;
  }
  .table-header h2 {
    font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
  }
  .tag {
    font-size: 0.7rem; padding: 2px 10px; border-radius: 999px;
    background: rgba(91,110,245,0.15); color: var(--accent5);
    border: 1px solid rgba(91,110,245,0.25);
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(255,255,255,0.02); }
  th {
    text-align: left; padding: 0.85rem 1.6rem;
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border);
  }
  th:not(:first-child) { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  td { padding: 1rem 1.6rem; font-size: 0.9rem; vertical-align: middle; }
  td:not(:first-child) { text-align: center; }
  .officer-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: var(--text); }
  .badge { display: inline-block; padding: 3px 14px; border-radius: 999px; font-size: 0.78rem; font-weight: 500; }
  .badge-pending  { background: rgba(247,183,49,0.12);  color: var(--accent3); border: 1px solid rgba(247,183,49,0.2); }
  .badge-done     { background: rgba(56,217,169,0.12);  color: var(--accent2); border: 1px solid rgba(56,217,169,0.2); }
  .badge-total    { background: rgba(162,155,254,0.12); color: var(--accent5); border: 1px solid rgba(162,155,254,0.2); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: center; }
  .progress-bar { width: 60px; height: 6px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent2), #00b4d8); transition: width 0.8s ease; }

  footer { text-align: center; padding-top: 1.5rem; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); }
  .last-updated { font-size: 0.75rem; color: var(--muted); text-align: right; margin-bottom: 1.5rem; }

  .state-msg { padding: 3rem 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }
  .spinner { width: 32px; height: 32px; margin: 0 auto 1rem; border: 2px solid var(--border); border-top-color: var(--accent1); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    th, td { padding: 0.75rem 0.9rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stat-value { font-size: 1.8rem; }
    .progress-bar { display: none; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>CP Database Summary</h1>
      <div class="subtitle" id="dashSubtitle">Loading...</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Fetching data...</span>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card c1"><div class="stat-label">Total Cases</div><div class="stat-value" id="totalCases">—</div></div>
    <div class="stat-card c2"><div class="stat-label">Distributed</div><div class="stat-value" id="distributed">—</div></div>
    <div class="stat-card c3"><div class="stat-label">Submitted</div><div class="stat-value" id="submitted">—</div></div>
    <div class="stat-card c4"><div class="stat-label">Signed</div><div class="stat-value" id="signed">—</div></div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <h2>Action Officers</h2>
      <span class="tag" id="officerCount">...</span>
    </div>
    <div id="tableWrap">
      <div class="state-msg"><div class="spinner"></div>Fetching live data from Google Sheets…</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

  <footer>Auto-refreshes every 60 seconds &nbsp;·&nbsp; Data pulled live from Google Sheets</footer>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLyJW3eJIcesJ92qNir7tRLnr7O2cu48rXUV6hhhTgTeicbw36kCeJ90tO8qfyC_d2KfRogC_ce022/pub?gid=1916268155&single=true&output=csv";
const REFRESH_MS = 60000;

function parseCSV(text) {
  return text.trim().split("\n").map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function num(v) {
  if (!v || v === "") return 0;
  const n = Number(String(v).replace(/,/g, "").trim());
  return isNaN(n) ? 0 : n;
}

function setStatus(live, msg) {
  document.getElementById("statusText").textContent = msg;
  const dot = document.getElementById("statusDot");
  dot.className = "dot" + (live ? "" : " error");
}

function render(rows) {
  // Row 0: headers (Total Cases, Distributed, Submitted, Signed)
  // Row 1: summary numbers
  // Row 2: action officer sub-header (Action Officer Name, Pending, Finished, Total)
  // Row 3+: officer data

  if (rows.length < 2) {
    document.getElementById("tableWrap").innerHTML =
      `<div class="state-msg">⚠️ Not enough data rows found. Check your sheet layout.</div>`;
    return;
  }

  const sumRow = rows[1] || [];
  document.getElementById("totalCases").textContent  = num(sumRow[0]) || "—";
  document.getElementById("distributed").textContent = num(sumRow[1]) || "—";
  document.getElementById("submitted").textContent   = num(sumRow[2]) || "—";
  document.getElementById("signed").textContent      = num(sumRow[3]) || "—";

  const officerRows = rows.slice(3).filter(r => r[0] && r[0].trim() !== "");
  document.getElementById("officerCount").textContent =
    officerRows.length + " officer" + (officerRows.length !== 1 ? "s" : "");

  const maxTotal = Math.max(...officerRows.map(r => num(r[3])), 1);

  let tbody = "";
  officerRows.forEach(r => {
    const name     = r[0] || "—";
    const pending  = num(r[1]);
    const finished = num(r[2]);
    const total    = num(r[3]);
    const pct      = total > 0 ? Math.round((finished / total) * 100) : 0;

    tbody += `
      <tr>
        <td><span class="officer-name">${name}</span></td>
        <td><span class="badge badge-pending">${pending}</span></td>
        <td>
          <div class="bar-wrap">
            <span class="badge badge-done">${finished}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </td>
        <td><span class="badge badge-total">${total}</span></td>
      </tr>`;
  });

  document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead><tr>
        <th>Action Officer</th>
        <th>Pending</th>
        <th>Finished</th>
        <th>Total</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>`;

  const now = new Date();
  document.getElementById("dashSubtitle").textContent =
    now.toLocaleString("en-US", { month: "long", year: "numeric" }) + " — Live View";
  document.getElementById("lastUpdated").textContent =
    "Last updated: " + now.toLocaleTimeString();
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL + "&cachebust=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    render(rows);
    setStatus(true, "Live");
  } catch (e) {
    setStatus(false, "Error — retrying");
    document.getElementById("tableWrap").innerHTML =
      `<div class="state-msg">⚠️ Could not load data: ${e.message}<br><br>
       <span style="font-size:0.8rem">Make sure the sheet is published to web as CSV and the link is still active.</span></div>`;
  }
}

fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
